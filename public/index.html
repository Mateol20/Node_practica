<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personajes Épicos</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>⚔️ Panel de Personajes Épicos ⚔️</h1>

      <form id="character-form" class="form">
        <h2>Agregar Personaje</h2>
        <input name="name" placeholder="Nombre" required />
        <input name="race" placeholder="Raza" required />
        <input name="role" placeholder="Rol" required />
        <input name="level" type="number" placeholder="Nivel" required />
        <input name="universe" placeholder="Universo" required />
        <button type="submit">Agregar</button>
      </form>

      <div id="loading" class="loading">Cargando personajes...</div>

      <div id="characters-container" class="grid"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
